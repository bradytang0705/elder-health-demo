<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧养老健康监测 — UI 交互展示</title>
<style>
/* ========== 全局 ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-deep: #0B1120; --bg-card: #1E293B; --bg-card2: rgba(30,41,59,0.7);
  --text: #F1F5F9; --text2: #94A3B8; --text3: #64748B;
  --border: #334155; --divider: rgba(51,65,85,0.5);
  --blue: #3B82F6; --cyan: #06B6D4; --danger: #EF4444; --safe: #22C55E; --warn: #F59E0B;
  --glow: 0 0 20px rgba(59,130,246,.25);
  --glow-danger: 0 0 20px rgba(239,68,68,.25);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg-deep);
  background-image: radial-gradient(ellipse at 50% 0%, rgba(59,130,246,.08) 0%, transparent 60%),
    radial-gradient(circle at 20% 80%, rgba(6,182,212,.04) 0%, transparent 40%);
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 20px;
}
.wrapper { display: flex; gap: 24px; align-items: flex-start; }

/* ========== 手机框 ========== */
.phone-frame {
  width: 375px; height: 812px; background: var(--bg-deep);
  border-radius: 36px; box-shadow: 0 20px 60px rgba(0,0,0,.5), 0 0 0 6px #1E293B, 0 0 40px rgba(59,130,246,.1);
  overflow: hidden; position: relative; flex-shrink: 0;
}
.page { position: absolute; inset: 0; overflow-y: auto; display: none; flex-direction: column;
  background: var(--bg-deep); transition: opacity .25s, transform .25s; }
.page.active { display: flex; }
.page.slide-in { animation: slideIn .3s ease-out; }
.page.slide-back { animation: slideBack .3s ease-out; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0.3; } to { transform: translateX(0); opacity: 1; } }
@keyframes slideBack { from { transform: translateX(-40%); opacity: 0.3; } to { transform: translateX(0); opacity: 1; } }

/* ========== 状态栏 & 导航栏 ========== */
.status-bar { height: 24px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; font-size: 10px; color: var(--text3); flex-shrink: 0; background: rgba(15,23,42,.8); }
.nav { display: flex; align-items: center; padding: 10px 16px; background: rgba(15,23,42,.95);
  border-bottom: 1px solid var(--border); min-height: 44px; flex-shrink: 0;
  backdrop-filter: blur(10px); }
.nav-back { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: var(--blue); cursor: pointer; border-radius: 8px;
  border: 1px solid rgba(59,130,246,.3); transition: all .2s; }
.nav-back:hover { background: rgba(59,130,246,.15); border-color: var(--blue); }
.nav-title { flex: 1; text-align: center; font-size: 17px; font-weight: 600; color: var(--text); }
.nav-action { font-size: 13px; color: var(--blue); cursor: pointer; padding: 4px 12px;
  border: 1px solid rgba(59,130,246,.4); border-radius: 6px; transition: all .2s; }
.nav-action:hover { background: rgba(59,130,246,.15); }
.nav-spacer { width: 32px; }

/* ========== 底部标签栏 ========== */
.tab-bar { display: flex; border-top: 1px solid var(--border); background: rgba(15,23,42,.95);
  flex-shrink: 0; backdrop-filter: blur(10px); }
.tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 6px 0 4px;
  cursor: pointer; color: var(--text3); font-size: 10px; gap: 2px; transition: all .2s;
  border: none; background: none; }
.tab-item.active { color: var(--blue); }
.tab-icon { font-size: 20px; }

/* ========== 内容区 ========== */
.content { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 16px;
  transition: all .2s; }
.card-tap { cursor: pointer; }
.card-tap:hover { border-color: var(--blue); box-shadow: var(--glow); transform: translateY(-1px); }
.card-tap:active { transform: scale(.98); }

/* ========== 图表/数据区 ========== */
.chart-bar { display: flex; align-items: flex-end; gap: 6px; height: 100px; padding: 0 2px; }
.chart-bar .bar { flex: 1; background: var(--border); border-radius: 4px 4px 0 0; min-height: 4px; position: relative; }
.chart-bar .bar.high { background: linear-gradient(180deg, var(--blue), rgba(59,130,246,.3)); }

.ring { width: 90px; height: 90px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 30px; font-weight: 700; color: var(--text);
  border: 4px solid var(--border); position: relative; }
.ring::before { content: ''; position: absolute; inset: -6px; border-radius: 50%; border: 2px solid transparent; }
.ring.good { border-color: var(--safe); color: var(--safe); }
.ring.good::before { border-color: rgba(34,197,94,.3); }
.ring.warn { border-color: var(--warn); color: var(--warn); }
.ring.warn::before { border-color: rgba(245,158,11,.3); }
.ring.danger { border-color: var(--danger); color: var(--danger); animation: pulse-ring 1.5s infinite; }
.ring.danger::before { border-color: rgba(239,68,68,.3); animation: pulse-ring2 1.5s infinite; }
@keyframes pulse-ring { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,.4); } 50% { box-shadow: 0 0 0 16px rgba(239,68,68,0); } }
@keyframes pulse-ring2 { 0%,100% { inset: -6px; opacity: 1; } 50% { inset: -14px; opacity: 0; } }

.tag { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 500; }
.tag-blue { background: rgba(59,130,246,.15); color: var(--blue); border: 1px solid rgba(59,130,246,.3); }
.tag-red { background: rgba(239,68,68,.15); color: var(--danger); border: 1px solid rgba(239,68,68,.3); }
.tag-green { background: rgba(34,197,94,.15); color: var(--safe); border: 1px solid rgba(34,197,94,.3); }
.tag-yellow { background: rgba(245,158,11,.15); color: var(--warn); border: 1px solid rgba(245,158,11,.3); }
.tag-outline { background: transparent; color: var(--text3); border: 1px solid var(--border); }

.btn { display: block; width: 100%; padding: 13px; border-radius: 12px; text-align: center;
  font-size: 15px; font-weight: 600; cursor: pointer; transition: all .15s; border: none;
  background: var(--bg-card); color: var(--text); border: 1px solid var(--border); }
.btn:hover { opacity: .9; }
.btn:active { transform: scale(.97); }
.btn-primary { background: linear-gradient(135deg, var(--blue), var(--cyan)); color: #fff;
  border: none; box-shadow: var(--glow); }
.btn-danger { background: linear-gradient(135deg, #DC2626, #EF4444); color: #fff; border: none; }
.btn-outline { background: transparent; border: 1px solid var(--blue); color: var(--blue); }

/* ========== 布局工具 ========== */
.row { display: flex; align-items: center; gap: 10px; }
.row-between { display: flex; align-items: center; justify-content: space-between; }
.flex-1 { flex: 1; }
.text-sm { font-size: 12px; color: var(--text3); }
.text-md { font-size: 14px; color: var(--text2); line-height: 1.6; }
.text-lg { font-size: 18px; font-weight: 600; color: var(--text); }
.text-xl { font-size: 24px; font-weight: 700; color: var(--text); }
.text-center { text-align: center; }
.mt-1 { margin-top: 8px; }
.mt-2 { margin-top: 16px; }
.mb-1 { margin-bottom: 8px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }

/* ========== 头像 & 图标 ========== */
.avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 22px; background: var(--border);
  border: 2px solid rgba(59,130,246,.3); }
.avatar-lg { width: 64px; height: 64px; font-size: 28px; }

/* ========== 输入框 ========== */
.input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px;
  font-size: 14px; color: var(--text); background: rgba(15,23,42,.6); outline: none; transition: .2s; }
.input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,.1); }
.input::placeholder { color: var(--text3); }

/* ========== 进度条 ========== */
.progress-bar { height: 8px; border-radius: 4px; background: var(--border); overflow: hidden; }
.progress-bar .fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--blue), var(--cyan)); }

/* ========== 开关 ========== */
.toggle { width: 44px; height: 26px; border-radius: 13px; cursor: pointer; position: relative;
  background: var(--border); transition: background .2s; border: 1px solid rgba(255,255,255,.1); }
.toggle.on { background: var(--blue); }
.toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 18px; height: 18px;
  border-radius: 50%; background: #fff; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
.toggle.on::after { transform: translateX(18px); }

/* ========== SOS ========== */
.sos-btn { width: 130px; height: 130px; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-size: 22px; font-weight: 700; color: var(--danger);
  margin: 0 auto; cursor: pointer; border: 4px solid var(--danger);
  background: rgba(239,68,68,.08); animation: sos-pulse 2s infinite; }
@keyframes sos-pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,.4); } 50% { box-shadow: 0 0 0 24px rgba(239,68,68,0); } }

/* ========== 侧边栏 ========== */
.sidebar {
  width: 210px; background: var(--bg-card); border-radius: 14px; box-shadow: 0 8px 32px rgba(0,0,0,.3);
  padding: 12px 0; max-height: 700px; overflow-y: auto; flex-shrink: 0;
  border: 1px solid var(--border);
}
.sidebar h3 { padding: 8px 16px; font-size: 14px; color: var(--text); border-bottom: 1px solid var(--divider);
  margin-bottom: 4px; }
.sidebar a { display: block; padding: 6px 16px; font-size: 12px; color: var(--text2); cursor: pointer;
  text-decoration: none; transition: all .15s; border-left: 2px solid transparent; }
.sidebar a:hover { color: var(--blue); background: rgba(59,130,246,.06); border-left-color: var(--blue); }
.sidebar a.current { color: var(--blue); background: rgba(59,130,246,.1); border-left-color: var(--blue); font-weight: 600; }
.sidebar .sep { border-top: 1px solid var(--divider); margin: 4px 12px; }

/* ========== 登录页渐变背景 ========== */
.login-grad { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
.login-grad::before { content: ''; position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
  width: 200px; height: 200px; background: radial-gradient(circle, rgba(59,130,246,.25) 0%, transparent 70%); }
.login-grad::after { content: ''; position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
  width: 250px; height: 100px; background: radial-gradient(ellipse, rgba(6,182,212,.12) 0%, transparent 70%); }

/* ========== 告警脉冲 ========== */
.pulse-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--danger);
  animation: pulse-dot 1.5s infinite; display: inline-block; }
@keyframes pulse-dot { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,.6); } 50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); } }

/* 选中指示器 */
.level-active { border-color: var(--blue) !important; background: rgba(59,130,246,.12) !important; }
</style>
</head>
<body>
<div class="wrapper">

<!-- ==================== 手机框 ==================== -->
<div class="phone-frame" id="phone">
  <div id="pageContainer"></div>
</div>

<!-- ==================== 侧边导航 ==================== -->
<nav class="sidebar" id="sidebar">
  <h3>📱 页面列表 (22)</h3>
  <a data-page="login">01 登录页</a>
  <a data-page="index">02 首页</a>
  <a data-page="health">03 健康数据</a>
  <a data-page="bp-detail">04 血压详情</a>
  <a data-page="hr-detail">05 心率详情</a>
  <a data-page="sleep-detail">06 睡眠详情</a>
  <a data-page="sugar-detail">07 血糖详情</a>
  <a data-page="report">08 健康报告</a>
  <a data-page="report-detail">09 报告详情</a>
  <a data-page="mine">10 我的</a>
  <div class="sep"></div>
  <a data-page="elderly-list">11 老人管理</a>
  <a data-page="elderly-edit">12 添加编辑老人</a>
  <a data-page="device">13 设备管理</a>
  <a data-page="device-detail">14 设备详情</a>
  <a data-page="alert">15 告警记录</a>
  <a data-page="alert-detail">16 告警详情</a>
  <a data-page="about">17 关于APP</a>
  <div class="sep"></div>
  <a data-page="medication">18 用药提醒</a>
  <a data-page="medication-edit">19 添加编辑用药</a>
  <a data-page="sos">20 紧急求助</a>
  <a data-page="tips">21 健康知识</a>
  <a data-page="tips-detail">22 健康知识详情</a>
</nav>

</div>

<script>
// ==================== 工具函数 ====================
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'className') el.className = v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2), v);
    else if (k === 'style') Object.assign(el.style, v);
    else if (k === 'type') el.setAttribute(k, v);
    else if (k === 'placeholder') el.setAttribute(k, v);
    else el.setAttribute(k, v);
  });
  children.forEach(c => {
    if (typeof c === 'string') el.appendChild(document.createTextNode(c));
    else if (c instanceof Node) el.appendChild(c);
    else if (Array.isArray(c)) c.forEach(x => el.appendChild(typeof x === 'string' ? document.createTextNode(x) : x));
  });
  return el;
}

// ==================== 导航系统 ====================
const historyStack = [];

function navigateTo(pageId) {
  const container = document.getElementById('pageContainer');
  const oldPage = container.querySelector('.page.active');
  const oldId = oldPage ? oldPage.id : null;
  if (oldId === pageId) return;
  if (oldId) historyStack.push(oldId);

  let page = document.getElementById(pageId);
  if (!page) { page = buildPage(pageId); container.appendChild(page); }
  if (oldPage) oldPage.classList.remove('active', 'slide-in', 'slide-back');
  page.classList.add('active', 'slide-in');
  setTimeout(() => page.classList.remove('slide-in'), 300);
  updateSidebar(pageId);
  page.scrollTop = 0;
}

function goBack() {
  if (historyStack.length === 0) return;
  const prevId = historyStack.pop();
  const container = document.getElementById('pageContainer');
  const oldPage = container.querySelector('.page.active');
  let page = document.getElementById(prevId);
  if (!page) { page = buildPage(prevId); container.appendChild(page); }
  if (oldPage) oldPage.classList.remove('active', 'slide-in', 'slide-back');
  page.classList.add('active', 'slide-back');
  setTimeout(() => page.classList.remove('slide-back'), 300);
  updateSidebar(prevId);
  page.scrollTop = 0;
}

function switchTab(pageId) {
  historyStack.length = 0;
  const container = document.getElementById('pageContainer');
  const oldPage = container.querySelector('.page.active');
  if (oldPage && oldPage.id === pageId) return;
  let page = document.getElementById(pageId);
  if (!page) { page = buildPage(pageId); container.appendChild(page); }
  if (oldPage) oldPage.classList.remove('active', 'slide-in', 'slide-back');
  page.classList.add('active', 'slide-in');
  setTimeout(() => page.classList.remove('slide-in'), 300);
  updateSidebar(pageId);
  page.scrollTop = 0;
}

function updateSidebar(id) {
  document.querySelectorAll('#sidebar a').forEach(a => a.classList.toggle('current', a.dataset.page === id));
}

// ==================== 组件工厂 ====================
function makeNav(title, showBack, rightAction) {
  const nav = h('div', { className: 'nav' });
  nav.appendChild(showBack
    ? h('div', { className: 'nav-back', onClick: goBack }, '←')
    : h('div', { className: 'nav-spacer' }));
  nav.appendChild(h('div', { className: 'nav-title' }, title));
  nav.appendChild(rightAction
    ? h('div', { className: 'nav-action', onClick: rightAction.onClick }, rightAction.text)
    : h('div', { className: 'nav-spacer' }));
  return nav;
}

function makeTabBar(current) {
  const tabs = [
    { id:'index', icon:'🏠', label:'首页' }, { id:'health', icon:'❤️', label:'健康数据' },
    { id:'report', icon:'📋', label:'健康报告' }, { id:'mine', icon:'👤', label:'我的' },
  ];
  return h('div', { className: 'tab-bar' },
    ...tabs.map(t => h('button', { className: 'tab-item' + (t.id===current?' active':''), onClick:()=>switchTab(t.id) },
      h('span',{className:'tab-icon'},t.icon), h('span',{},t.label)))
  );
}

function card(content, opts={}) {
  const cls = ['card'];
  if (opts.tap) cls.push('card-tap');
  return h('div', { className: cls.join(' '), onClick: opts.onClick || null }, content);
}

function chartBars(n, maxH) {
  return h('div', { className: 'chart-bar', style: { height: maxH+'px' } },
    ...Array.from({length:n},() => h('div',{className:'bar high',style:{height:(35+Math.random()*55)+'%'}})));
}

// ==================== 页面构建 ====================
function buildPage(id) {
  const page = h('div', { id, className: 'page' });

  switch(id) {

  // ===== 01 登录页 =====
  case 'login':
    page.appendChild(h('div', { className: 'login-grad' }));
    page.appendChild(h('div', { className: 'status-bar' }, [h('span',{},'9:41'), h('span',{},'📶 🔋')]));
    page.appendChild(h('div', { style: { flex:1, display:'flex', flexDirection:'column', alignItems:'center',
      justifyContent:'center', padding:'40px 32px', gap:'20px', position:'relative', zIndex:1 } }, [
      h('div', { style: { width:'88px', height:'88px', borderRadius:'24px',
        background:'linear-gradient(135deg, rgba(59,130,246,.3), rgba(6,182,212,.2))',
        display:'flex', alignItems:'center', justifyContent:'center', fontSize:'40px', marginBottom:'8px',
        border:'1px solid rgba(59,130,246,.3)' } }, '🏥'),
      h('div', { className: 'text-xl', style: { fontSize:'26px' } }, '智慧养老'),
      h('div', { style: { fontSize:'14px', color:'var(--text2)', letterSpacing:'2px' } }, '健康监测平台'),
      h('div', { style: { width:'100%', display:'flex', flexDirection:'column', gap:'14px', marginTop:'36px' } }, [
        h('input', { className: 'input', placeholder: '手机号/账号', style: { textAlign:'center', padding:'12px' } }),
        h('input', { className: 'input', placeholder: '密码', type:'password', style: { textAlign:'center', padding:'12px' } }),
        h('button', { className: 'btn btn-primary', style: { marginTop:'6px', padding:'14px' },
          onClick: () => switchTab('index') }, '登 录'),
        h('div', { className: 'row', style: { justifyContent:'space-between', marginTop:'6px' } }, [
          h('span', { style: { fontSize:'12px', color:'var(--text3)', cursor:'pointer' } }, '忘记密码'),
          h('span', { style: { fontSize:'12px', color:'var(--blue)', cursor:'pointer' } }, '注册账号'),
        ]),
      ]),
      h('div', { style: { position:'absolute', bottom:'36px', fontSize:'12px', color:'var(--text3)' } }, 'v1.0.0 · 离线模式'),
    ]));
    break;

  // ===== 02 首页 =====
  case 'index':
    page.appendChild(h('div',{className:'status-bar'},[h('span',{},'9:41'),h('span',{},'📶 🔋')]));
    page.appendChild(makeNav('首页'));
    page.appendChild(h('div',{className:'content'},[
      card([
        h('div',{className:'row',style:{marginBottom:'12px'}},[
          h('div',{className:'avatar avatar-lg'},'👴'),
          h('div',{className:'flex-1'},[
            h('div',{className:'text-lg'},'张爷爷'),
            h('div',{style:{fontSize:'12px',color:'var(--text2)',marginTop:'2px'}},'男 · 78岁 · 高血压'),
            h('div',{className:'tag tag-blue',style:{marginTop:'6px'}},'已绑定设备'),
          ]),
          h('span',{style:{fontSize:'22px',color:'var(--text3)',cursor:'pointer'},onClick:()=>navigateTo('elderly-list')},'›'),
        ]),
      ]),
      h('div',{className:'grid-2'},[
        card([h('div',{style:{fontSize:'12px',color:'var(--text3)'}},'血压'),h('div',{className:'text-lg',style:{marginTop:'4px'}},'128/82'),h('div',{className:'tag tag-green',style:{marginTop:'6px'}},'正常')],{tap:true,onClick:()=>navigateTo('health')}),
        card([h('div',{style:{fontSize:'12px',color:'var(--text3)'}},'心率'),h('div',{className:'text-lg',style:{marginTop:'4px'}},'72 bpm'),h('div',{className:'tag tag-green',style:{marginTop:'6px'}},'正常')],{tap:true,onClick:()=>navigateTo('health')}),
        card([h('div',{style:{fontSize:'12px',color:'var(--text3)'}},'睡眠'),h('div',{className:'text-lg',style:{marginTop:'4px'}},'7.2h'),h('div',{className:'tag tag-green',style:{marginTop:'6px'}},'良好')],{tap:true,onClick:()=>navigateTo('health')}),
        card([h('div',{style:{fontSize:'12px',color:'var(--text3)'}},'血糖'),h('div',{className:'text-lg',style:{marginTop:'4px'}},'5.6'),h('div',{className:'tag tag-green',style:{marginTop:'6px'}},'正常')],{tap:true,onClick:()=>navigateTo('health')}),
      ]),
      h('div',{className:'grid-3'},[

            h('div',{style:{width:'44px',height:'44px',borderRadius:'8px',background:'var(--border)',
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:'20px',flexShrink:0}},'📖'),
            h('div',{className:'flex-1'},[h('div',{style:{fontSize:'14px',fontWeight:600,color:'var(--text)'}},t),
              h('div',{className:'tag tag-blue',style:{fontSize:'10px',marginTop:'4px'}},'健康知识')]),
          ]),
        ],{tap:true,onClick:()=>{}})),
    ]));
    break;

  default: break;
  }

  return page;
}

// ==================== 初始化 ====================
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('#sidebar a').forEach(a => {
    a.addEventListener('click', () => {
      const id = a.dataset.page;
      ['index','health','report','mine'].includes(id) ? switchTab(id) : navigateTo(id);
    });
  });
  navigateTo('login');
});
</script>
