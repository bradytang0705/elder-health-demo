<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧养老健康监测 — 交互原型</title>
<style>
/* ========== 全局 ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #E8ECF1; --phone-bg: #FFFFFF; --card: #FAFBFC;
  --text: #334155; --text2: #475569; --text3: #94A3B8;
  --border: #CBD5E1; --accent: #3B82F6; --danger: #EF4444;
  --safe: #22C55E; --warn: #F59E0B; --divider: #E2E8F0;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  background-image: radial-gradient(circle, #CBD5E1 1px, transparent 1px);
  background-size: 20px 20px;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 20px;
}

/* ========== 外框 ========== */
.wrapper { display: flex; gap: 24px; align-items: flex-start; }
.phone-frame {
  width: 375px; height: 812px; background: var(--phone-bg);
  border-radius: 36px; box-shadow: 0 20px 60px rgba(0,0,0,.15), 0 0 0 6px #1E293B;
  overflow: hidden; position: relative; flex-shrink: 0;
}
.page { position: absolute; inset: 0; overflow-y: auto; display: none; flex-direction: column;
  background: var(--phone-bg); transition: opacity .25s, transform .25s; }
.page.active { display: flex; }
.page.slide-in { animation: slideIn .3s ease-out; }
.page.slide-back { animation: slideBack .3s ease-out; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0.5; } to { transform: translateX(0); opacity: 1; } }
@keyframes slideBack { from { transform: translateX(-40%); opacity: 0.5; } to { transform: translateX(0); opacity: 1; } }

/* ========== 导航栏 ========== */
.nav { display: flex; align-items: center; padding: 12px 16px; background: var(--phone-bg);
  border-bottom: 1px dashed var(--border); min-height: 48px; flex-shrink: 0; }
.nav-back { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: var(--accent); cursor: pointer; border: 1px dashed var(--border); border-radius: 6px; }
.nav-back:hover { background: #EFF6FF; }
.nav-title { flex: 1; text-align: center; font-size: 17px; font-weight: 600; color: var(--text); }
.nav-action { font-size: 14px; color: var(--accent); cursor: pointer; padding: 4px 8px;
  border: 1px dashed var(--accent); border-radius: 4px; }
.nav-action:hover { background: #EFF6FF; }
.nav-spacer { width: 32px; }

/* ========== 底部标签栏 ========== */
.tab-bar { display: flex; border-top: 1px dashed var(--border); background: var(--phone-bg);
  flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); }
.tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 0 6px;
  cursor: pointer; color: var(--text3); font-size: 10px; gap: 2px; transition: color .2s;
  border: none; background: none; }
.tab-item.active { color: var(--accent); }
.tab-icon { font-size: 22px; }

/* ========== 内容区 ========== */
.content { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.card { background: var(--card); border: 2px dashed var(--border); border-radius: 12px; padding: 16px; }
.card-tap { cursor: pointer; transition: all .15s; }
.card-tap:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59,130,246,.1); }
.card-tap:active { transform: scale(.98); }

/* ========== 占位图 ========== */
.placeholder {
  background: repeating-linear-gradient(-45deg, #F1F5F9, #F1F5F9 4px, #E2E8F0 4px, #E2E8F0 8px);
  border: 2px dashed var(--border); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text3); font-size: 13px; overflow: hidden; position: relative;
}
.placeholder::after { content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(59,130,246,.05) 50%, transparent 60%); }

/* ========== 通用元素 ========== */
.chart-bar { display: flex; align-items: flex-end; gap: 8px; height: 120px; padding: 0 4px; }
.chart-bar .bar { flex: 1; background: var(--border); border-radius: 4px 4px 0 0; min-height: 4px;
  border: 1px dashed var(--text3); position: relative; }
.chart-bar .bar.high { background: var(--accent); border-color: var(--accent); opacity: .6; }
.ring { width: 80px; height: 80px; border-radius: 50%; border: 6px dashed var(--border);
  display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; color: var(--text); }
.ring.good { border-color: var(--safe); color: var(--safe); }
.ring.warn { border-color: var(--warn); color: var(--warn); }
.ring.danger { border-color: var(--danger); color: var(--danger); animation: pulse-ring 1.5s infinite; }
@keyframes pulse-ring { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,.3); } 50% { box-shadow: 0 0 0 12px rgba(239,68,68,0); } }

.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; border: 1px dashed var(--border); }
.tag-blue { border-color: var(--accent); color: var(--accent); background: #EFF6FF; }
.tag-red { border-color: var(--danger); color: var(--danger); background: #FEF2F2; }
.tag-green { border-color: var(--safe); color: var(--safe); background: #F0FDF4; }
.tag-yellow { border-color: var(--warn); color: var(--warn); background: #FFFBEB; }

.btn { display: block; width: 100%; padding: 12px; border-radius: 10px; text-align: center;
  font-size: 15px; font-weight: 600; cursor: pointer; transition: all .15s; border: 2px dashed var(--border); background: var(--card); color: var(--text); }
.btn:hover { opacity: .85; }
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
.btn-outline { background: transparent; border-color: var(--accent); color: var(--accent); }

.row { display: flex; align-items: center; gap: 10px; }
.row-between { display: flex; align-items: center; justify-content: space-between; }
.flex-1 { flex: 1; }
.text-sm { font-size: 12px; color: var(--text3); }
.text-md { font-size: 14px; color: var(--text2); }
.text-lg { font-size: 18px; font-weight: 600; color: var(--text); }
.text-xl { font-size: 22px; font-weight: 700; color: var(--text); }
.text-center { text-align: center; }
.mt-1 { margin-top: 8px; }
.mt-2 { margin-top: 16px; }
.mb-1 { margin-bottom: 8px; }
.gap-1 { gap: 8px; }
.gap-2 { gap: 16px; }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }

.avatar { width: 48px; height: 48px; border-radius: 50%; border: 2px dashed var(--border);
  display: flex; align-items: center; justify-content: center; font-size: 24px; background: var(--card); }
.avatar-lg { width: 64px; height: 64px; font-size: 32px; }

.input { width: 100%; padding: 10px 12px; border: 2px dashed var(--border); border-radius: 8px;
  font-size: 14px; color: var(--text); background: var(--card); outline: none; }
.input:focus { border-color: var(--accent); }

/* ========== 指示点 ========== */
.dot { width: 8px; height: 8px; border-radius: 50%; border: 1px dashed var(--border); }
.dot.active { background: var(--accent); border-color: var(--accent); }

/* ========== 侧边导航 ========== */
.sidebar {
  width: 220px; background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.08);
  padding: 12px 0; max-height: 700px; overflow-y: auto; flex-shrink: 0;
  border: 2px dashed var(--border);
}
.sidebar h3 { padding: 8px 16px; font-size: 14px; color: var(--text); border-bottom: 1px dashed var(--divider); margin-bottom: 4px; }
.sidebar a { display: block; padding: 6px 16px; font-size: 12px; color: var(--text2); cursor: pointer;
  text-decoration: none; transition: all .1s; border-left: 2px solid transparent; }
.sidebar a:hover { color: var(--accent); background: #F8FAFC; border-left-color: var(--accent); }
.sidebar a.current { color: var(--accent); background: #EFF6FF; border-left-color: var(--accent); font-weight: 600; }
.sidebar .sep { border-top: 1px dashed var(--divider); margin: 4px 12px; }

/* ========== 标注 ========== */
.callout {
  position: absolute; background: var(--accent); color: #fff; font-size: 11px;
  padding: 4px 10px; border-radius: 4px; white-space: nowrap; z-index: 10;
  animation: calloutPulse 2s infinite; pointer-events: none;
}
.callout::before { content: ''; position: absolute; width: 8px; height: 8px;
  background: var(--accent); transform: rotate(45deg); }
.callout.left { right: calc(100% + 10px); top: 50%; transform: translateY(-50%); }
.callout.left::before { right: -4px; top: 50%; margin-top: -4px; }
.callout.right { left: calc(100% + 10px); top: 50%; transform: translateY(-50%); }
.callout.right::before { left: -4px; top: 50%; margin-top: -4px; }
@keyframes calloutPulse { 0%,100% { opacity: 1; } 50% { opacity: .7; } }

/* ========== 开关 ========== */
.toggle {
  width: 44px; height: 24px; border-radius: 12px; cursor: pointer; position: relative;
  background: var(--border); border: 1px dashed var(--text3); transition: background .2s;
}
.toggle.on { background: var(--accent); border-color: var(--accent); }
.toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px;
  border-radius: 50%; background: #fff; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.15); }
.toggle.on::after { transform: translateX(20px); }

/* ========== 进度条 ========== */
.progress-bar { height: 8px; border-radius: 4px; background: var(--divider); overflow: hidden; border: 1px dashed var(--border); }
.progress-bar .fill { height: 100%; border-radius: 4px; background: var(--accent); }

/* 状态栏模拟 */
.status-bar { height: 24px; background: var(--card); display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; font-size: 10px; color: var(--text3); border-bottom: 1px dashed var(--divider); flex-shrink: 0; }

/* SOS 大按钮 */
.sos-btn { width: 120px; height: 120px; border-radius: 50%; border: 4px dashed var(--danger);
  display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700;
  color: var(--danger); margin: 0 auto; cursor: pointer; animation: sos-pulse 2s infinite; }
@keyframes sos-pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,.3); } 50% { box-shadow: 0 0 0 20px rgba(239,68,68,0); } }
</style>
</head>
<body>
<div class="wrapper">

<!-- ==================== 手机框 ==================== -->
<div class="phone-frame" id="phone">
  <div id="pageContainer"></div>
</div>

<!-- ==================== 侧边导航 ==================== -->
<nav class="sidebar" id="sidebar">
  <h3>📱 页面列表</h3>
  <a data-page="login">01 登录页</a>
  <a data-page="index">02 首页</a>
  <a data-page="health">03 健康数据</a>
  <a data-page="bp-detail">04 血压详情</a>
  <a data-page="hr-detail">05 心率详情</a>
  <a data-page="sleep-detail">06 睡眠详情</a>
  <a data-page="sugar-detail">07 血糖详情</a>
  <a data-page="report">08 健康报告</a>
  <a data-page="report-detail">09 报告详情</a>
  <a data-page="mine">10 我的</a>
  <div class="sep"></div>
  <a data-page="elderly-list">11 老人管理</a>
  <a data-page="elderly-edit">12 添加编辑老人</a>
  <a data-page="device">13 设备管理</a>
  <a data-page="device-detail">14 设备详情</a>
  <a data-page="alert">15 告警记录</a>
  <a data-page="alert-detail">16 告警详情</a>
  <a data-page="about">17 关于APP</a>
  <div class="sep"></div>
  <a data-page="medication">18 用药提醒</a>
  <a data-page="medication-edit">19 添加编辑用药</a>
  <a data-page="sos">20 紧急求助</a>
  <a data-page="tips">21 健康知识</a>
  <a data-page="tips-detail">22 健康知识详情</a>
</nav>

</div>

<script>
// ==================== 页面模板 ====================
const T = {};

// 快捷创建元素
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'className') el.className = v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2), v);
    else if (k === 'style') Object.assign(el.style, v);
    else el.setAttribute(k, v);
  });
  children.forEach(c => {
    if (typeof c === 'string') el.appendChild(document.createTextNode(c));
    else if (c instanceof Node) el.appendChild(c);
    else if (Array.isArray(c)) c.forEach(x => el.appendChild(typeof x === 'string' ? document.createTextNode(x) : x));
  });
  return el;
}

// ==================== 已访问过的原型页 ====================
const visited = {};

// ==================== 导航系统 ====================
const historyStack = [];

function navigateTo(pageId) {
  const container = document.getElementById('pageContainer');
  const oldPage = container.querySelector('.page.active');
  const oldId = oldPage ? oldPage.id : null;

  if (oldId === pageId) return;
  if (oldId) historyStack.push(oldId);

  // 创建或获取页面
  let page = document.getElementById(pageId);
  if (!page) {
    page = buildPage(pageId);
    container.appendChild(page);
  }

  // 过渡动画
  if (oldPage) {
    oldPage.classList.remove('active', 'slide-in', 'slide-back');
  }
  page.classList.add('active', 'slide-in');
  setTimeout(() => page.classList.remove('slide-in'), 300);

  // 更新侧边栏
  document.querySelectorAll('#sidebar a').forEach(a => {
    a.classList.toggle('current', a.dataset.page === pageId);
  });

  // 滚动页面到顶部
  page.scrollTop = 0;
}

function goBack() {
  if (historyStack.length === 0) return;
  const prevId = historyStack.pop();
  const container = document.getElementById('pageContainer');
  const oldPage = container.querySelector('.page.active');

  let page = document.getElementById(prevId);
  if (!page) {
    page = buildPage(prevId);
    container.appendChild(page);
  }

  if (oldPage) {
    oldPage.classList.remove('active', 'slide-in', 'slide-back');
  }
  page.classList.add('active', 'slide-back');
  setTimeout(() => page.classList.remove('slide-back'), 300);

  document.querySelectorAll('#sidebar a').forEach(a => {
    a.classList.toggle('current', a.dataset.page === prevId);
  });
  page.scrollTop = 0;
}

function switchTab(pageId) {
  // 清空历史（tab切换不回退）
  historyStack.length = 0;
  const container = document.getElementById('pageContainer');
  const oldPage = container.querySelector('.page.active');
  if (oldPage && oldPage.id === pageId) return;

  let page = document.getElementById(pageId);
  if (!page) {
    page = buildPage(pageId);
    container.appendChild(page);
  }

  if (oldPage) {
    oldPage.classList.remove('active', 'slide-in', 'slide-back');
  }
  page.classList.add('active', 'slide-in');
  setTimeout(() => page.classList.remove('slide-in'), 300);

  document.querySelectorAll('#sidebar a').forEach(a => {
    a.classList.toggle('current', a.dataset.page === pageId);
  });
  page.scrollTop = 0;
}

// ==================== 页面构建 ====================
function makeNav(title, showBack, rightAction) {
  const nav = h('div', { className: 'nav' });
  if (showBack) {
    nav.appendChild(h('div', { className: 'nav-back', onClick: goBack }, '←'));
  } else {
    nav.appendChild(h('div', { className: 'nav-spacer' }));
  }
  nav.appendChild(h('div', { className: 'nav-title' }, title));
  if (rightAction) {
    nav.appendChild(h('div', { className: 'nav-action', onClick: rightAction.onClick }, rightAction.text));
  } else {
    nav.appendChild(h('div', { className: 'nav-spacer' }));
  }
  return nav;
}

function makeTabBar(currentTab) {
  const tabs = [
    { id: 'index', icon: '🏠', label: '首页' },
    { id: 'health', icon: '❤️', label: '健康数据' },
    { id: 'report', icon: '📋', label: '健康报告' },
    { id: 'mine', icon: '👤', label: '我的' },
  ];
  const bar = h('div', { className: 'tab-bar' });
  tabs.forEach(t => {
    bar.appendChild(h('button', {
      className: 'tab-item' + (t.id === currentTab ? ' active' : ''),
      onClick: () => switchTab(t.id)
    }, [
      h('span', { className: 'tab-icon' }, t.icon),
      h('span', {}, t.label)
    ]));
  });
  return bar;
}

function card(content, opts = {}) {
  const cls = ['card'];
  if (opts.tap) cls.push('card-tap');
  return h('div', { className: cls.join(' '), onClick: opts.onClick || null }, content);
}

function placeholder(w, h, text) {
  return h('div', { className: 'placeholder', style: { width, height, minHeight: '40px' } }, text || '');
}

// ==================== 构建所有页面 ====================
function buildPage(id) {
  const page = h('div', { id, className: 'page' });

  switch(id) {

  // ========== 01 登录页 ==========
  case 'login':
    page.appendChild(h('div', { className: 'status-bar' }, [h('span',{},'9:41'), h('span',{},'📶 🔋')]));
    page.appendChild(h('div', { style: { flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'32px', gap:'24px' } }, [
      h('div', { className: 'placeholder', style: { width:'80px', height:'80px', borderRadius:'20px' } }, '🏥'),
      h('div', { className: 'text-xl', style: { textAlign:'center' } }, '智慧养老'),
      h('div', { className: 'text-md', style: { textAlign:'center' } }, '健康监测平台'),
      h('div', { style: { width:'100%', display:'flex', flexDirection:'column', gap:'12px', marginTop:'32px' } }, [
        h('input', { className: 'input', placeholder: '手机号/账号', style: { textAlign:'center' } }),
        h('input', { className: 'input', placeholder: '密码', type:'password', style: { textAlign:'center' } }),
        h('button', { className: 'btn btn-primary', style: { marginTop:'8px' }, onClick: () => switchTab('index') }, '登 录'),
        h('div', { className: 'row', style: { justifyContent:'space-between', marginTop:'8px' } }, [
          h('span', { className: 'text-sm', style: { cursor:'pointer', color:'var(--accent)' } }, '忘记密码'),
          h('span', { className: 'text-sm', style: { cursor:'pointer', color:'var(--accent)' } }, '注册账号'),
        ]),
      ]),
      h('div', { style: { position:'absolute', bottom:'40px' }, className: 'text-sm' }, 'v1.0.0 · 离线模式'),
    ]));
    break;

  // ========== 02 首页 ==========
  case 'index':
    page.appendChild(h('div', { className: 'status-bar' }, [h('span',{},'9:41'), h('span',{},'📶 🔋')]));
    page.appendChild(makeNav('首页'));
    page.appendChild(h('div', { className: 'content' }, [
      // 老人信息卡
      card([
        h('div', { className: 'row', style: { marginBottom:'12px' } }, [
          h('div', { className: 'avatar avatar-lg' }, '👴'),
          h('div', { className: 'flex-1' }, [
            h('div', { className: 'text-lg' }, '张爷爷'),
            h('div', { className: 'text-sm', style: { marginTop:'2px' } }, '男 · 78岁 · 高血压'),
            h('div', { className: 'tag tag-blue', style: { marginTop:'4px' } }, '已绑定设备'),
          ]),
          h('span', { style: { fontSize:'20px', color:'var(--text3)', cursor:'pointer' }, onClick: () => navigateTo('elderly-list') }, '›'),
        ]),
      ], { tap: false }),
      // 健康概览
      h('div', { className: 'grid-2' }, [
        card([h('div',{className:'text-sm'},'血压'), h('div',{className:'text-lg',style:{marginTop:'4px'}},'128/82'), h('div',{className:'tag tag-green',style:{marginTop:'4px'}},'正常')], { tap: true, onClick: () => navigateTo('health') }),
        card([h('div',{className:'text-sm'},'心率'), h('div',{className:'text-lg',style:{marginTop:'4px'}},'72 bpm'), h('div',{className:'tag tag-green',style:{marginTop:'4px'}},'正常')], { tap: true, onClick: () => navigateTo('health') }),
        card([h('div',{className:'text-sm'},'睡眠'), h('div',{className:'text-lg',style:{marginTop:'4px'}},'7.2h'), h('div',{className:'tag tag-green',style:{marginTop:'4px'}},'良好')], { tap: true, onClick: () => navigateTo('health') }),
        card([h('div',{className:'text-sm'},'血糖'), h('div',{className:'text-lg',style:{marginTop:'4px'}},'5.6'), h('div',{className:'tag tag-green',style:{marginTop:'4px'}},'正常')], { tap: true, onClick: () => navigateTo('health') }),
      ]),
      // 快捷入口
      h('div', { className: 'grid-3' }, [
        card([h('div',{style:{fontSize:'28px',textAlign:'center'}},'🔔'), h('div',{className:'text-sm',style:{textAlign:'center',marginTop:'4px'}},'告警')], { tap: true, onClick: () => navigateTo('alert') }),
        card([h('div',{style:{fontSize:'28px',textAlign:'center'}},'💊'), h('div',{className:'text-sm',style:{textAlign:'center',marginTop:'4px'}},'用药')], { tap: true, onClick: () => navigateTo('medication') }),
        card([h('div',{style:{fontSize:'28px',textAlign:'center'}},'📖'), h('div',{className:'text-sm',style:{textAlign:'center',marginTop:'4px'}},'知识')], { tap: true, onClick: () => navigateTo('tips') }),
      ]),
    ]));
    page.appendChild(makeTabBar('index'));
    break;

  // ========== 03 健康数据 ==========
  case 'health':
    page.appendChild(h('div', { className: 'status-bar' }, [h('span',{},'9:41'), h('span',{},'📶 🔋')]));
    page.appendChild(makeNav('健康数据'));
    page.appendChild(h('div', { className: 'content' }, [

    a.addEventListener('click', () => {
      const pageId = a.dataset.page;
      if (['index','health','report','mine'].includes(pageId)) {
        switchTab(pageId);
      } else {
        navigateTo(pageId);
      }
    });
  });

  // 初始显示登录页
  navigateTo('login');
});
</script>
</body>
</html>
