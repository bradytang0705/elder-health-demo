<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧养老健康监测 - 后台管理系统</title>
<style>
:root {
  --bg-deep: #0B1120;
  --bg-card: #1E293B;
  --bg-card-hover: #273548;
  --bg-input: #0F172A;
  --border: #334155;
  --text: #E2E8F0;
  --text-secondary: #94A3B8;
  --text-muted: #64748B;
  --blue: #3B82F6;
  --blue-glow: rgba(59,130,246,0.3);
  --green: #10B981;
  --green-bg: rgba(16,185,129,0.15);
  --red: #EF4444;
  --red-bg: rgba(239,68,68,0.15);
  --orange: #F59E0B;
  --orange-bg: rgba(245,158,11,0.15);
  --purple: #8B5CF6;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg-deep);
  color: var(--text);
  display: flex;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Sidebar */
.sidebar {
  width: 240px;
  background: rgba(15,23,42,0.8);
  backdrop-filter: blur(20px);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
}

.sidebar-logo {
  padding: 24px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}

.sidebar-logo .icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--blue), #6366F1);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}

.sidebar-logo .text h2 {
  font-size: 15px;
  font-weight: 700;
  background: linear-gradient(135deg, #E2E8F0, #94A3B8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.sidebar-logo .text span {
  font-size: 11px;
  color: var(--text-muted);
}

.sidebar-nav {
  flex: 1;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text-secondary);
  font-size: 14px;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}

.nav-item:hover {
  background: var(--bg-card);
  color: var(--text);
}

.nav-item.active {
  background: rgba(59,130,246,0.15);
  color: var(--blue);
  box-shadow: inset 0 0 0 1px rgba(59,130,246,0.3);
}

.nav-item .badge {
  margin-left: auto;
  background: var(--red);
  color: #fff;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  min-width: 20px;
  text-align: center;
}

.nav-divider {
  height: 1px;
  background: var(--border);
  margin: 8px 0;
}

/* Main */
.main {
  margin-left: 240px;
  flex: 1;
  padding: 24px;
  min-height: 100vh;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
}

.header h1 {
  font-size: 22px;
  font-weight: 700;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.header-time {
  color: var(--text-secondary);
  font-size: 13px;
}

/* Stats Grid */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 28px;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  position: relative;
  overflow: hidden;
}

.stat-card::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 80px; height: 80px;
  border-radius: 0 0 0 80px;
  opacity: 0.08;
}

.stat-card.blue::after { background: var(--blue); }
.stat-card.green::after { background: var(--green); }
.stat-card.orange::after { background: var(--orange); }
.stat-card.purple::after { background: var(--purple); }

.stat-label {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

.stat-value {
  font-size: 32px;
  font-weight: 700;
  line-height: 1;
}

.stat-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 6px;
}

/* Card */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.card-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-header h3 {
  font-size: 15px;
  font-weight: 600;
}

.card-body { padding: 20px; }

/* Table */
.table-wrap { overflow-x: auto; }

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  text-align: left;
  padding: 12px 14px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

td {
  padding: 12px 14px;
  font-size: 13px;
  border-bottom: 1px solid rgba(51,65,85,0.4);
  white-space: nowrap;
}

tr:hover td { background: rgba(30,41,59,0.5); }

/* Tags & Badges */
.tag {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
}

.tag-blue { background: rgba(59,130,246,0.15); color: #60A5FA; }
.tag-green { background: var(--green-bg); color: #34D399; }
.tag-red { background: var(--red-bg); color: #F87171; }
.tag-orange { background: var(--orange-bg); color: #FBBF24; }
.tag-purple { background: rgba(139,92,246,0.15); color: #A78BFA; }

.status-dot {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  margin-right: 6px;
}

.status-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
.status-dot.offline { background: var(--text-muted); }
.status-dot.warning { background: var(--orange); box-shadow: 0 0 6px var(--orange); }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
  font-family: inherit;
}

.btn-primary {
  background: var(--blue);
  color: #fff;
}
.btn-primary:hover {
  background: #2563EB;
  box-shadow: 0 0 20px var(--blue-glow);
}

.btn-outline {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
}
.btn-outline:hover {
  border-color: var(--blue);
  color: var(--blue);
}

.btn-sm {
  padding: 5px 10px;
  font-size: 12px;
}

.btn-danger {
  background: transparent;
  border: 1px solid rgba(239,68,68,0.3);
  color: var(--red);
}
.btn-danger:hover {
  background: var(--red-bg);
}

/* Grid layouts */
.grid-2 {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

.grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

/* Chart placeholder */
.chart-area {
  height: 260px;
  background: rgba(15,23,42,0.5);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: flex-end;
  padding: 16px;
  gap: 12px;
}

.chart-bar {
  flex: 1;
  background: linear-gradient(to top, var(--blue), #6366F1);
  border-radius: 4px 4px 0 0;
  position: relative;
  min-width: 20px;
  transition: all 0.3s;
}

.chart-bar:hover {
  filter: brightness(1.3);
}

.chart-label {
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 8px;
}

.bar-value {
  position: absolute;
  top: -20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: var(--text-secondary);
}

/* Alerts */
.alert-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  margin-bottom: 10px;
  transition: all 0.2s;
  cursor: pointer;
}

.alert-item:hover { border-color: var(--text-muted); }

.alert-icon {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.alert-icon.emergency { background: var(--red-bg); }
.alert-icon.warning { background: var(--orange-bg); }
.alert-icon.info { background: rgba(59,130,246,0.15); }

.alert-content { flex: 1; }
.alert-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.alert-desc { font-size: 12px; color: var(--text-secondary); }
.alert-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

.alert-status {
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 20px;
}

/* Timeline */
.timeline { position: relative; padding-left: 24px; }

.timeline::before {
  content: '';
  position: absolute;
  left: 8px;
  top: 4px; bottom: 4px;
  width: 2px;
  background: var(--border);
}

.timeline-item {
  position: relative;
  padding: 8px 0 16px 16px;
}

.timeline-item::before {
  content: '';
  position: absolute;
  left: -20px;
  top: 12px;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--blue);
  box-shadow: 0 0 8px var(--blue-glow);
}

.timeline-title { font-size: 13px; font-weight: 500; }
.timeline-time { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

/* Section nav */
.section-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 4px;
  border: 1px solid var(--border);
}

.tab-btn {
  flex: 1;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  background: none;
  border: none;
  color: var(--text-secondary);
  transition: all 0.2s;
  font-family: inherit;
}

.tab-btn.active {
  background: rgba(59,130,246,0.15);
  color: var(--blue);
}

/* Empty state */
.empty {
  text-align: center;
  padding: 40px;
  color: var(--text-muted);
}

.empty-icon { font-size: 48px; margin-bottom: 12px; }

/* Media queries */
@media (max-width: 1200px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
}

@media (max-width: 768px) {
  .sidebar { width: 60px; }
  .sidebar-logo .text, .nav-item span:not(.badge) { display: none; }
  .main { margin-left: 60px; }
  .stats-grid { grid-template-columns: 1fr; }
}

/* Login Overlay */
.login-overlay{position:fixed;inset:0;z-index:9999;background:var(--bg-deep);display:flex;align-items:center;justify-content:center;
  background-image:radial-gradient(ellipse at 50% 0%,rgba(59,130,246,.08) 0%,transparent 60%);}
.login-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:40px;width:380px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.login-card h2{font-size:22px;font-weight:700;text-align:center;margin-bottom:4px;}
.login-card .subtitle{text-align:center;color:var(--text-muted);font-size:13px;margin-bottom:28px;}
.login-card .input-group{margin-bottom:18px;}
.login-card .input-group label{display:block;font-size:13px;color:var(--text-secondary);margin-bottom:6px;font-weight:500;}
.login-card .input-group input{width:100%;padding:12px 14px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s;}
.login-card .input-group input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.1);}
.login-card .btn-login{width:100%;padding:12px;background:linear-gradient(135deg,var(--blue),#6366F1);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;}
.login-card .btn-login:hover{box-shadow:0 0 20px var(--blue-glow);}
.login-card .error-msg{color:var(--red);font-size:12px;text-align:center;margin-top:12px;min-height:18px;}
.login-card .hint{text-align:center;color:var(--text-muted);font-size:11px;margin-top:20px;line-height:1.8;}
.login-card .hint b{color:var(--text-secondary);}
.hidden{display:none!important;}

</style>
</head>

<script>
// ==================== Auth (client-side demo) ====================
const DEMO_USERS = [
  { username:'superadmin', password:'admin123', role:'超级管理员' },
  { username:'admin', password:'admin123', role:'管理员' },
  { username:'doctor', password:'doctor123', role:'健康管理师' },
];

function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value.trim();
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  if (!username || !password) { errEl.textContent = '请输入用户名和密码'; return; }
  btn.disabled = true; btn.textContent = '登录中...'; errEl.textContent = '';
  setTimeout(() => {
    const user = DEMO_USERS.find(u => u.username === username && u.password === password);
    if (!user) { errEl.textContent = '用户名或密码错误'; btn.disabled = false; btn.textContent = '登 录'; return; }
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('sidebarUserDisplay').textContent = username;
    document.getElementById('sidebarRoleDisplay').textContent = user.role;
  }, 500);
}

function doLogout() {
  document.getElementById('loginOverlay').classList.remove('hidden');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  main.innerHTML = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('loginOverlay').classList.contains('hidden')) {
    doLogin();
  }
});

const main = document.getElementById('mainContent');
let currentPage = 'dashboard';

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'className') el.className = v;
      else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
      else if (k === 'innerHTML') el.innerHTML = v;
      else el.setAttribute(k, v);
    }
  }
  for (const c of children.flat()) {
    if (c == null) continue;
    el.appendChild(typeof c === 'string' || typeof c === 'number' ? document.createTextNode(c) : c);
  }
  return el;
}

function renderPage(page) {
  currentPage = page;
  main.innerHTML = '';
  switch(page) {
    case 'dashboard': renderDashboard(); break;
    case 'users': renderUsers(); break;
    case 'devices': renderDevices(); break;
    case 'health': renderHealth(); break;
    case 'alerts': renderAlerts(); break;
    case 'settings': renderSettings(); break;
  }
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-page="${page}"]`).classList.add('active');
}

            ])
          ])
        );
      });
    }

    document.querySelectorAll('#settingsTabs .tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`#settingsTabs [data-stab="${settingsTab}"]`).classList.add('active');
  }

  main.appendChild(
    h('div', {}, [
      h('div', {className:'header'}, h('h1', {}, '系统设置')),
      h('div', {className:'section-tabs', id:'settingsTabs'}, [
        h('button', {className:'tab-btn active', 'data-stab':'basic', onClick:()=>{settingsTab='basic';renderTab();}}, '⚙️ 基础设置'),
        h('button', {className:'tab-btn', 'data-stab':'third', onClick:()=>{settingsTab='third';renderTab();}}, '🔌 第三方服务'),
      ]),
      h('div', {className:'card'}, [
        h('div', {className:'card-body', id:'settingsContainer'})
      ]),
      h('p', {style:{color:'var(--text-muted)',fontSize:'12px',marginTop:'16px',textAlign:'center'}},
        '💡 演示模式 — 数据为静态展示，实际部署后连接 API 支持动态修改'
      )
    ])
  );

  renderTab();
}

// ==================== Toast ====================
function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = h('div', {
    className:'toast',
    style: {
      position:'fixed', bottom:'24px', left:'50%', transform:'translateX(-50%)',
      background:'var(--bg-card)', border:'1px solid var(--border)', borderRadius:'var(--radius-sm)',
      padding:'12px 24px', fontSize:'14px', color:'var(--text)', zIndex:'9999',
      boxShadow:'0 8px 32px rgba(0,0,0,0.5)', animation:'slideUp 0.3s ease'
    }
  }, msg);
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

// ==================== Init ====================
document.querySelectorAll('.nav-item').forEach(btn => {
  btn.addEventListener('click', () => renderPage(btn.dataset.page));
});

// Update time
setInterval(() => {
  const timeEl = document.querySelector('.header-time');
  if (timeEl) timeEl.textContent = new Date().toLocaleString('zh-CN');
}, 30000);

// Initial render
renderPage('dashboard');
</script>

<style>
@keyframes slideUp {
  from { opacity: 0; transform: translateX(-50%) translateY(10px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
</style>

</body>
